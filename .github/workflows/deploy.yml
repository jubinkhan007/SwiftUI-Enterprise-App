name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'
      - 'SharedModels/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }} # Optional: only if your key has a passphrase
          password: ${{ secrets.VPS_PASSWORD }} # Alternative: use password if you don't use SSH keys
          port: 22
          script_stop: true
          command_timeout: 60m
          script: |
            cd /root/SwiftUI-Enterprise-App/Backend
            
            # Pull the latest code
            git pull origin main
            
            # Rebuild and restart the Docker containers in the background
            docker-compose up -d --build --remove-orphans
            
            # Clean up old unused images to save disk space
            docker image prune -f
