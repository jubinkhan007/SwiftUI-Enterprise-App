# docker-compose.prod.yml — For production VPS deployment
# Pulls the pre-built image from GitHub Container Registry instead of building locally.
#
# Usage:
#   docker-compose -f docker-compose.prod.yml pull
#   docker-compose -f docker-compose.prod.yml up -d

version: "3.8"

services:
  app:
    image: ghcr.io/jubinkhan007/enterprise-backend:latest
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-enterprise-app-dev-secret-key-change-in-production}
      - DATABASE_PATH=/data/enterprise_app.db
      - OPENSSL_ia32cap=0
    volumes:
      - dbdata:/data
    restart: unless-stopped

volumes:
  dbdata:
