# Replace certificate paths with your LetsEncrypt paths.
server {
    listen 443 ssl http2;
    server_name enterpriseapp.chickenkiller.com;

    ssl_certificate     /etc/letsencrypt/live/enterpriseapp.chickenkiller.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enterpriseapp.chickenkiller.com/privkey.pem;

    # Optional hardening
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Vapor (Docker) listens on host port 8080 via docker-compose.
    # IMPORTANT: ensure BOTH /health and /api/* route to the same upstream.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets support (Phase 11 realtime)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name enterpriseapp.chickenkiller.com;
    return 301 https://$host$request_uri;
}
