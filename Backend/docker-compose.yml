version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: Backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-enterprise-app-dev-secret-key-change-in-production}
      # SQLite database will be stored on the named volume so it persists across
      # container restarts and is not blocked by a read-only image layer.
      - DATABASE_PATH=/data/enterprise_app.db
    volumes:
      - dbdata:/data
    restart: unless-stopped

volumes:
  dbdata:
